<style>
  :root {
    --primary: #1e3a8a;       /* أزرق غامق للنصوص الرئيسية */
    --secondary: #e6f0ff;     /* أزرق فاتح للخلفيات */
    --accent: #60c3b0;        /* أخضر فاتح للأزرار والتفاصيل */
    --text: #0f172a;          /* لون نص داكن للوضوح */
    --card-bg: #ffffff;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--secondary);
    color: var(--text);
    line-height: 1.6;
  }

  header {
    background: #ffffff;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    border-bottom: 2px solid var(--accent);
  }

  h1 {
    margin: 0;
    color: var(--primary);
    font-weight: 700;
    font-size: 28px;
  }

  .btn {
    background: var(--accent);
    color: white;
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.3s, transform 0.2s;
  }

  .btn:hover {
    background: #45a494;
    transform: translateY(-2px);
  }

  .hero {
    padding: 80px 20px;
    text-align: center;
    background: linear-gradient(135deg, #dff6ff 0%, #ffffff 100%);
    border-bottom: 3px solid var(--accent);
  }

  .hero h2 {
    font-size: 36px;
    color: var(--primary);
    margin-bottom: 15px;
  }

  .hero p {
    font-size: 18px;
    max-width: 700px;
    margin: auto;
    color: #334155;
  }

  .section {
    padding: 60px 20px;
    max-width: 1200px;
    margin: auto;
  }

  .services {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
    margin-top: 25px;
  }

  .card {
    background: var(--card-bg);
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.06);
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .card:hover {
    transform: translateY(-7px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.1);
  }

  .card h3 {
    color: var(--primary);
    font-size: 20px;
    margin-bottom: 10px;
  }

  .card p {
    color: #334155;
    font-size: 16px;
  }

  .category-title {
    margin-top: 50px;
    color: var(--primary);
    border-right: 6px solid var(--accent);
    padding-right: 12px;
    font-size: 22px;
    font-weight: 600;
  }

  .contact input, .contact textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    font-size: 16px;
  }

  footer {
    text-align: center;
    padding: 25px;
    background: #ffffff;
    margin-top: 50px;
    font-size: 14px;
    color: #475569;
    border-top: 2px solid var(--accent);
  }

  /* لمسات إضافية لجمالية علمية */
  .section:nth-of-type(even) {
    background: #f0faff;
    border-radius: 20px;
    margin: 40px 0;
    padding: 60px 20px;
  }

</style>
